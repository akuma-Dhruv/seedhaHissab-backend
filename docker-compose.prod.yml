services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: seedhahisaab-api

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      PORT: 8080

    ports:
      - "8080:8080"