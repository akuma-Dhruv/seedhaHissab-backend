# Production Profile Configuration
# Used for Docker deployments and production environments

# Database configuration is read from DATABASE_URL environment variable
# Set by docker-compose.yml or deployment platform

# Logging - Production level
logging.level.root=WARN
logging.level.com.seedhahisaab=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# Performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
