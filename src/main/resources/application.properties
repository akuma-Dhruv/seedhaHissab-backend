server.port=${PORT:8080}
server.servlet.context-path=/api

# ============================================================================
# Database Configuration
# ============================================================================
# Primary method: DATABASE_URL environment variable (used by Docker)
# Format: postgresql://user:password@host:port/database
# 
# Fallback: spring.datasource properties (used for local development)
# These are used if DATABASE_URL is not set.
spring.datasource.host=${SPRING_DATASOURCE_HOST:localhost}
spring.datasource.port=${SPRING_DATASOURCE_PORT:5432}
spring.datasource.database=${SPRING_DATASOURCE_DATABASE:seedhahisaab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:seedhahisaab}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:seedhahisaab}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# HikariCP connection pool configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================================================
# JWT Configuration
# ============================================================================
jwt.expiration.ms=86400000
jwt.secret=dev-secret-key-minimum-32-characters-long-for-jwt
