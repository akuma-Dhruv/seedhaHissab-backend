# Development Profile Configuration
# Used for local development (mvn spring-boot:run)

# Database defaults for local PostgreSQL
spring.datasource.host=localhost
spring.datasource.port=5432
spring.datasource.database=seedhahisaab
spring.datasource.username=seedhahisaab
spring.datasource.password=seedhahisaab

# In dev we let Hibernate auto-evolve the schema for fast iteration on
# entity changes. Production uses the default `validate` mode so any drift
# from migrations is caught at startup.
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.root=INFO
logging.level.com.seedhahisaab=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
