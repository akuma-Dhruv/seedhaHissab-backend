# =============================================================================
# SeedhaHisaab Backend - docker-compose.yml
# -----------------------------------------------------------------------------
# Brings up everything needed to run the backend locally with one command:
#
#     docker compose up           # both Postgres + Spring Boot app
#     docker compose up db        # ONLY Postgres (run app locally with Maven)
#     docker compose up --build   # rebuild the app image after code changes
#
# Environment variables are read from the `.env` file in this folder.
# Copy `.env.example` -> `.env` and edit it before the first run.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  # This service is REQUIRED. The Spring Boot app cannot start without it.
  # Data is persisted in a named Docker volume so it survives `docker compose down`.
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: seedhahisaab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seedhahisaab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seedhahisaab}
      POSTGRES_DB: ${POSTGRES_DB:-seedhahisaab}
    ports:
      # Exposed on host so you can also connect from your IDE / psql.
      # Change the LEFT side if 5432 is already in use on your machine.
      - "5432:5432"
    volumes:
      - seedhahisaab_db_data:/var/lib/postgresql/data
    healthcheck:
      # `app` waits for this healthcheck to pass before starting.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seedhahisaab} -d ${POSTGRES_DB:-seedhahisaab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Spring Boot application (OPTIONAL)
  # ---------------------------------------------------------------------------
  # This service is OPTIONAL. If you prefer to run the app from your IDE or
  # via `mvn spring-boot:run`, just start the `db` service alone:
  #
  #     docker compose up db
  #
  # Then point your local app at:
  #     DATABASE_URL=postgresql://seedhahisaab:seedhahisaab@localhost:5432/seedhahisaab
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seedhahisaab-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # The DataSourceConfig.java code parses this single URL.
      # Note: hostname is `db` (the service name above), NOT localhost,
      # because containers talk to each other over the compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-seedhahisaab}:${POSTGRES_PASSWORD:-seedhahisaab}@db:5432/${POSTGRES_DB:-seedhahisaab}
      # JWT signing key — REQUIRED. Set a long random string in your .env file.
      SESSION_SECRET: ${SESSION_SECRET}
      # Origin allowed by CORS. Set to your frontend URL (e.g. http://localhost:5173).
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:5173}
      # Port the Spring Boot server listens on inside the container.
      PORT: 8080
    ports:
      # Exposes the API at http://localhost:8080/api on your host machine.
      - "8080:8080"

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
# `seedhahisaab_db_data` is where Postgres stores its files. To wipe the DB:
#     docker compose down -v
# ---------------------------------------------------------------------------
volumes:
  seedhahisaab_db_data:
